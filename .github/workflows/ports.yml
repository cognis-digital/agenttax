name: ports
on: [push, pull_request]
permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - name: Build
        run: npx tsc -p tsconfig.json
      - name: Test
        run: node --test "dist/test/smoke.test.js"
      - name: Smoke (parity with reference demo)
        run: |
          node dist/src/cli.js --version
          node dist/src/cli.js taxonomy > /dev/null
          node dist/src/cli.js classify ../../demos/01-basic/findings.json --format json > out.json
          node -e "const d=require('./out.json'); const hits=Object.values(d.summary.by_category).filter(Boolean).length; if(hits!==7){console.error('expected 7 categories, got '+hits);process.exit(1)}"

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build + smoke
        run: |
          go build -o agenttax ./cmd/agenttax
          ./agenttax --version
          ./agenttax taxonomy > /dev/null
          ./agenttax classify ../../demos/01-basic/findings.json --format json > /dev/null

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test
      - name: Build + smoke
        run: |
          cargo build --release
          ./target/release/agenttax --version
          ./target/release/agenttax taxonomy > /dev/null
          ./target/release/agenttax classify ../../demos/01-basic/findings.json
